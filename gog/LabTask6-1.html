<!DOCTYPE html>
<html>
<head>
    <title>Lab Task 6</title>

    <style>
        body{
            font-family: Arial;
        }

       
        .container{
            margin: 20px;
        }

       
        .textbox{
            display: block;
            width: 250px;
            margin-bottom: 10px;
            padding: 5px;
        }

      
        .survey{
            margin-top: 20px;
        }

        .survey p{
            display: inline-block;
            width: 350px;
            vertical-align: middle;
        }

        .survey button{
            display: inline-block;
            vertical-align: middle;
            margin-left: 5px;
        }

      
        .google-section{
            margin-top: 40px;
            text-align: center;
            
        }

        .google-logo{
            display: block;
           margin: 0 auto;
           width: 200px;
            
        }

        .google-search{
            width: 400px;
            padding: 12px 20px;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            border: 1px solid #c4b5b5;

          
        }

        
        .challenge{
            margin-top: 50px;
        }

       
        .signup{
            width: 300px;
            border: 1px solid gray;
            padding: 15px;
            margin-bottom: 40px;
            
        }

        .signup input{
            display: block;
            width: 90%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #c4b5b5;
        }

        .signup .inline-input{
            display: inline-block;
            width: 42%;
        }

        .signup button{
            display: block;
            width: 95%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
             border-radius: 5px;
            border: 1px solid #c4b5b5;
        }

        
        .uber{
            width: 350px;
            border: 1px solid gray;
            padding: 15px;
        }

        .uber input{
            display: block;
            width: 95%;
            padding: 8px;
            margin-bottom: 10px;
        }

        .uber .btn{
            display: inline-block;
            padding: 10px;
            margin-right: 5px;
        }

        .request{
            background-color: black;
            color: white;
            border: none;
        }

        .schedule{
            background-color: lightgray;
            border: none;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Lab Task 6 Using Display Property</h2>

    
    <input type="text" placeholder="Name" class="textbox">
    <input type="email" placeholder="Email" class="textbox">

    
    <div class="survey">
        <p>
            Thanks for chatting with our customer support.
            Would you like to take our quick survey?
        </p>
        <button>Yes</button>
        <button>No</button>
    </div>

   
    <div class="google-section">
        <img src="../image/googl2.webp" alt="Google Logo" class="google-logo">
        <input type="text" placeholder="Search Google or type a URL" class="google-search">
    </div>

   
    <div class="challenge">

        <h3>Challenge Exercises</h3>

        
        <div class="signup">
            <input type="text" placeholder="First name" class="inline-input">
            <input type="text" placeholder="First name" class="inline-input">
            <input type="email" placeholder="Email">
            <button>Sign Up</button>
        </div>

        
        <div class="uber">
            <h2>Request a ride now</h2>
            <input type="text" placeholder="Enter pickup location">
            <input type="text" placeholder="Enter destination">
            <button class="btn request">Request now</button>
            <button class="btn schedule">Schedule for later</button>
        </div>

    </div>

</div>

</body>
</html>
